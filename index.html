<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Lyra&#65288;&#21016;&#28386;&#65289;&#20010;&#20154;&#23398;&#26415;&#20027;&#39029;, research interests include 3D Vision, Generative Reconstruction, and Scientific LLM Agents.">
  <title>Lyra&#65288;&#21016;&#28386;&#65289;&#20010;&#20154;&#23398;&#26415;&#20027;&#39029;</title>
  <link rel="icon" href="./academic-site-icon.jpg" type="image/jpeg">
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --accent: #2457a6;
      --bg: #f7f8fb;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: min(920px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 40px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 32px;
      align-items: center;
    }

    img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.65;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    .button {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 12px;
      background: #fff;
    }

    .button:hover {
      border-color: var(--accent);
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      main {
        grid-template-columns: 1fr;
        padding: 24px;
      }

      img {
        width: 150px;
        height: 150px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main>
    <img src="./liuying.jpg" alt="Lyra profile photo">
    <section>
      <h1>Lyra&#65288;&#21016;&#28386;&#65289;&#20010;&#20154;&#23398;&#26415;&#20027;&#39029;</h1>
      <p>AI undergraduate at <a href="https://www.xmu.edu.cn/">Xiamen University</a>, working on 3D vision, generative reconstruction, and scientific LLM agents.</p>
      <p>I have spent one and a half years as an on-site research intern at <a href="https://mac.xmu.edu.cn/">MAC Lab</a>, Xiamen University.</p>
      <div class="links">
        <a class="button" href="https://github.com/Lyra-Ying">GitHub</a>
        <a class="button" href="mailto:liuying07@stu.xmu.edu.cn">Email</a>
        <a class="button" href="https://mac.xmu.edu.cn/">MAC Lab</a>
        <a class="button" href="https://www.xmu.edu.cn/">Xiamen University</a>
      </div>
    </section>
  </main>
</body>
</html>
